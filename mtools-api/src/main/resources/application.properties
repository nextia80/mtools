# Spring Boot 애플리케이션 이름
spring.application.name=mtools-api

# PostgreSQL 데이터소스 (스키마: mtools)
spring.datasource.url=jdbc:postgresql://localhost:5432/mtools?currentSchema=mtools
spring.datasource.username=mtools
spring.datasource.password=123456

# 앱 기동 시 schema.sql / data.sql 자동 실행
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/schema.sql
spring.sql.init.data-locations=classpath:sql/data.sql

# Swagger UI / OpenAPI 문서 (http://localhost:8080/swagger-ui.html)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# CORS 허용 Origin (Vue 개발 서버)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# 로컬 전용 설정 파일 (없어도 기동 가능). client-id/secret 등은 여기서 덮어씀
spring.config.import=optional:classpath:application-local.properties

# Google Calendar OAuth (Google Cloud Console에서 발급)
# client secret은 application-local.properties 또는 GOOGLE_CLIENT_SECRET 환경 변수로 설정
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
# Google OAuth 콜백 URL (Cloud Console 리디렉션 URI와 일치해야 함)
app.google.redirect-uri=http://localhost:8080/api/calendar/oauth/callback
# OAuth 완료 후 브라우저를 돌려보낼 프론트엔드 URL
app.google.frontend-redirect-url=http://localhost:5173
# Gmail OAuth 콜백 URL (Cloud Console 리디렉션 URI와 일치해야 함)
app.google.mail-redirect-uri=http://localhost:8080/api/mail/oauth/callback

# MyBatis XML 매퍼 경로
mybatis.mapper-locations=classpath:mapper/**/*.xml

# JPA/Hibernate (엔티티 스키마 자동 반영, SQL 로그 출력)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
